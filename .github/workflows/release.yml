name: Release

on:
  push:
    branches: 
      - test-release

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build AMD64
      env: 
        tag: ${{ github.ref_name}}
      run: |
        VERSION="${tag#v}"
        GOOS=darwin CGO_ENABLED=1 GOARCH=amd64 go build -ldflags "-X github.com/alewtschuk/rmapp/cmd.version=$VERSION" -o rmapp-amd64

    - name: Build ARM64
      env: 
        tag: ${{ github.ref_name }}
      run: |
        VERSION="${tag#v}"
        GOOS=darwin CGO_ENABLED=1 GOARCH=arm64 go build -ldflags "-X github.com/alewtschuk/rmapp/cmd.version=$VERSION" -o rmapp-arm64

    - name: Create Universal
      run:  lipo -create -output rmapp rmapp-amd64 rmapp-arm64

    - name: Package Binary
      env: 
        tag: ${{ github.ref_name }}
      run: |
        archive_name="rmapp-${tag}-macos-universal.tar.gz"
        tar -czf "$archive_name" rmapp
        echo "ARCHIVE_NAME=$archive_name" >> $GITHUB_ENV

    - name: Simulate Release Step
      env: 
        tag: ${{ github.ref_name }}
        ARCHIVE_NAME: ${{ env.ARCHIVE_NAME }}
      run: |
        VERSION="${tag#v}"
        echo "Would run: gh release create \"$tag\" \"$ARCHIVE_NAME\" --title=\"$VERSION\""
        echo "Simulating success..."